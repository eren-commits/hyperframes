<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Cinematic Camera</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/RGBELoader.js"></script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #050510;
        overflow: hidden;
        font-family: "Inter", system-ui, sans-serif;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #050510;
      }
      #three-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
      }
      .move-label {
        position: absolute;
        bottom: 40px;
        left: 60px;
        font-family: "Inter", sans-serif;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.25);
        z-index: 100;
        pointer-events: none;
      }
      .move-label .name {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: none;
        color: rgba(255, 255, 255, 0.6);
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="16"
      data-width="1920"
      data-height="1080"
    >
      <canvas id="three-canvas" width="1920" height="1080"></canvas>

      <div id="move-label" class="move-label" style="opacity: 0">
        <div>Camera Move</div>
        <div id="move-name" class="name">Dolly Zoom</div>
      </div>

      <div
        id="driver"
        data-start="0"
        data-duration="16"
        data-track-index="0"
        style="position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none"
      ></div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};

        var W = 1920,
          H = 1080;
        var canvas = document.getElementById("three-canvas");

        var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(W, H);
        renderer.setPixelRatio(1);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        renderer.outputEncoding = THREE.sRGBEncoding;

        var scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.06);

        var camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 100);
        camera.position.set(0, 0, 4);

        // ── Environment lighting ──────────────────────────────
        var ambient = new THREE.AmbientLight(0x1a1a3a, 0.3);
        scene.add(ambient);

        var keyLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        keyLight.position.set(3, 4, 5);
        scene.add(keyLight);

        var fillLight = new THREE.DirectionalLight(0x4488ff, 0.4);
        fillLight.position.set(-3, 1, 3);
        scene.add(fillLight);

        var rimLight = new THREE.PointLight(0xff0080, 0.6, 15);
        rimLight.position.set(-3, 2, -3);
        scene.add(rimLight);

        var topLight = new THREE.PointLight(0x00d4ff, 0.4, 15);
        topLight.position.set(0, 5, 0);
        scene.add(topLight);

        // ── Ground grid ───────────────────────────────────────
        var gridHelper = new THREE.GridHelper(20, 40, 0x1a1a3a, 0x0a0a1a);
        gridHelper.position.y = -2;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.25;
        scene.add(gridHelper);

        // ── Floating particles ────────────────────────────────
        var particleCount = 300;
        var particleGeo = new THREE.BufferGeometry();
        var positions = new Float32Array(particleCount * 3);
        for (var i = 0; i < particleCount; i++) {
          positions[i * 3] = (Math.random() - 0.5) * 16;
          positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
          positions[i * 3 + 2] = (Math.random() - 0.5) * 12 - 2;
        }
        particleGeo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        var particleMat = new THREE.PointsMaterial({
          color: 0x00d4ff,
          size: 0.03,
          transparent: true,
          opacity: 0.25,
        });
        var particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // ── Load DamagedHelmet GLB ────────────────────────────
        var helmetGroup = new THREE.Group();
        scene.add(helmetGroup);

        var loader = new THREE.GLTFLoader();
        var modelReady = false;

        loader.load(
          "models/DamagedHelmet.glb",
          function (gltf) {
            var model = gltf.scene;
            var box = new THREE.Box3().setFromObject(model);
            var size = box.getSize(new THREE.Vector3());
            var scale = 2.2 / Math.max(size.x, size.y, size.z);
            model.scale.setScalar(scale);
            box.setFromObject(model);
            model.position.sub(box.getCenter(new THREE.Vector3()));

            model.traverse(function (child) {
              if (child.isMesh) {
                child.material.envMapIntensity = 1.5;
              }
            });

            helmetGroup.add(model);
            modelReady = true;
            renderer.render(scene, camera);
          },
          undefined,
          function (err) {
            // Fallback: show a reflective sphere if model fails to load
            var fallbackGeo = new THREE.IcosahedronGeometry(1.2, 4);
            var fallbackMat = new THREE.MeshPhysicalMaterial({
              color: 0x222244,
              metalness: 0.9,
              roughness: 0.1,
              clearcoat: 1,
              clearcoatRoughness: 0.05,
            });
            helmetGroup.add(new THREE.Mesh(fallbackGeo, fallbackMat));
            modelReady = true;
            renderer.render(scene, camera);
          },
        );

        // ── Camera state ──────────────────────────────────────
        var camState = { x: 0, y: 0, z: 4, lookX: 0, lookY: 0, lookZ: 0, fov: 50 };

        function updateCamera() {
          camera.position.set(camState.x, camState.y, camState.z);
          camera.lookAt(camState.lookX, camState.lookY, camState.lookZ);
          camera.fov = camState.fov;
          camera.updateProjectionMatrix();
        }

        // ── Camera moves ──────────────────────────────────────

        function dollyZoomKeyframes(tl, startT) {
          tl.to(camState, { z: 2.8, fov: 30, duration: 1.5, ease: "power2.inOut" }, startT);
          tl.to(camState, { z: 7, fov: 75, duration: 2, ease: "power2.inOut" }, startT + 1.5);
          tl.to(camState, { z: 4, fov: 50, duration: 0.5, ease: "power2.out" }, startT + 3.5);
        }

        function craneShotKeyframes(tl, startT) {
          tl.set(camState, { y: -2, z: 3.5, lookY: 0 }, startT);
          tl.to(camState, { y: 2.5, z: 4.5, lookY: 0, duration: 3, ease: "power1.inOut" }, startT);
          tl.to(camState, { z: 3.8, duration: 1, ease: "power2.out" }, startT + 3);
        }

        function orbitKeyframes(tl, startT) {
          var orbitState = { angle: 0 };
          tl.set(camState, { x: 0, y: 0.3, z: 4 }, startT);
          tl.to(
            orbitState,
            {
              angle: Math.PI * 1.2,
              duration: 4,
              ease: "power1.inOut",
              onUpdate: function () {
                camState.x = Math.sin(orbitState.angle) * 4;
                camState.z = Math.cos(orbitState.angle) * 4;
                camState.y = 0.3 + Math.sin(orbitState.angle * 0.7) * 0.8;
              },
            },
            startT,
          );
        }

        function rackFocusKeyframes(tl, startT) {
          tl.set(camState, { x: 0, y: 0, z: 4, fov: 50 }, startT);
          tl.to(
            camState,
            { z: 2, fov: 25, y: 0.2, x: 0.5, duration: 1.5, ease: "power3.inOut" },
            startT,
          );
          tl.to(camState, { x: -0.3, duration: 1, ease: "sine.inOut" }, startT + 1.5);
          tl.to(
            camState,
            { z: 5, fov: 55, x: 0, y: -0.3, duration: 1.5, ease: "power2.in" },
            startT + 2.5,
          );
        }

        // ── Build timeline ────────────────────────────────────
        var tl = gsap.timeline({
          paused: true,
          onUpdate: function () {
            updateCamera();
            helmetGroup.rotation.y += 0.003;
            particles.rotation.y += 0.001;
            renderer.render(scene, camera);
          },
        });

        var moveNames = ["Dolly Zoom", "Crane Shot", "Orbit", "Rack Focus"];
        var labelEl = document.getElementById("move-label");
        var nameEl = document.getElementById("move-name");

        dollyZoomKeyframes(tl, 0);
        craneShotKeyframes(tl, 4);
        orbitKeyframes(tl, 8);
        rackFocusKeyframes(tl, 12);

        for (var m = 0; m < 4; m++) {
          (function (idx) {
            var s = idx * 4;
            tl.call(
              function () {
                nameEl.textContent = moveNames[idx];
              },
              null,
              s + 0.1,
            );
            tl.fromTo(labelEl, { opacity: 0 }, { opacity: 1, duration: 0.3 }, s + 0.1);
            tl.to(labelEl, { opacity: 0, duration: 0.3 }, s + 3.4);
          })(m);
        }

        tl.to({}, { duration: 16, ease: "none" }, 0);
        renderer.render(scene, camera);
        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
