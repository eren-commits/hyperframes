<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Design your visual direction</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0e0e0e;
        color: #eee;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        font-size: 13px;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Phase bar ── */
      .phase-bar {
        display: flex;
        border-bottom: 1px solid #1a1a1a;
        padding: 0 20px;
        flex-shrink: 0;
        background: #111;
      }
      .phase-tab {
        padding: 12px 16px;
        font-size: 12px;
        font-weight: 600;
        color: #555;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
        letter-spacing: 0.02em;
      }
      .phase-tab.active {
        color: #fff;
        border-bottom-color: #fff;
      }
      .phase-tab.disabled {
        opacity: 0.25;
        pointer-events: none;
      }

      /* ── Phases ── */
      .phase {
        display: none;
        flex: 1;
        overflow: hidden;
      }
      .phase.active {
        display: flex;
      }

      /* ── Phase 1: Mood boards ── */
      .mood-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        padding: 20px;
        overflow-y: auto;
        flex: 1;
        align-content: start;
      }
      .mood-card {
        border: 1px solid #1e1e1e;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        transition:
          border-color 0.15s,
          transform 0.15s,
          box-shadow 0.15s;
        background: #141414;
        display: flex;
        flex-direction: column;
      }
      .mood-card:hover {
        border-color: #333;
        transform: translateY(-1px);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      }
      .mood-card.selected {
        border-color: #fff;
      }
      .mood-preview {
        aspect-ratio: 16/9;
        overflow: hidden;
        position: relative;
        background: #0a0a0a;
      }
      .mood-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }
      .mood-frame {
        transform-origin: top left;
        width: 1920px;
        height: 1080px;
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0;
        transition: opacity 0.25s;
        z-index: 1;
      }
      .mood-frame.active { opacity: 1; }
      .mood-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 28px;
        height: 28px;
        background: rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 50%;
        color: #fff;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.15s;
        z-index: 10;
        -webkit-user-select: none;
        user-select: none;
      }
      .mood-preview:hover .mood-arrow { opacity: 1; }
      .mood-arrow:hover { background: rgba(0,0,0,0.8); border-color: rgba(255,255,255,0.3); }
      .mood-arrow.left { left: 8px; }
      .mood-arrow.right { right: 8px; }
      .mood-dots {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 5px;
        z-index: 10;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .mood-preview:hover .mood-dots { opacity: 1; }
      .mood-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(255,255,255,0.25);
      }
      .mood-dot.active { background: #fff; }
      .mood-info {
        display: none;
      }
      .mood-name {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 3px;
      }
      .mood-desc {
        font-size: 11px;
        color: #666;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .mood-tokens {
        display: flex;
        gap: 4px;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .mood-token {
        font-size: 9px;
        color: #555;
        background: #1a1a1a;
        padding: 2px 7px;
        border-radius: 3px;
        letter-spacing: 0.02em;
      }

      .mood-header {
        padding: 20px 20px 0;
        flex-shrink: 0;
      }
      .mood-header h2 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 2px;
      }
      .mood-header p {
        font-size: 12px;
        color: #555;
      }
      .mood-next {
        padding: 12px 20px;
        flex-shrink: 0;
        display: flex;
        justify-content: flex-end;
      }
      .mood-next-btn {
        background: #fff;
        color: #000;
        border: none;
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        opacity: 0;
        transform: translateY(8px);
        transition: all 0.2s;
      }
      .mood-next-btn.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .mood-next-btn:hover {
        background: #ddd;
      }

      /* ── Phase 2: Fine-tune ── */
      .panel-left {
        width: 400px;
        min-width: 400px;
        height: 100%;
        overflow-y: auto;
        border-right: 1px solid #1a1a1a;
        padding: 0 0 100px;
        background: #111;
      }
      .panel-right {
        flex: 1;
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        background: #0e0e0e;
      }
      .panel-right * {
        max-width: 100%;
        box-sizing: border-box;
      }

      /* ── Section cards (Neuform-inspired) ── */
      .section-card {
        border-bottom: 1px solid #1a1a1a;
      }
      .section-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 16px 6px;
      }
      .section-icon {
        width: 22px;
        height: 22px;
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.04);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #555;
        font-size: 11px;
        flex-shrink: 0;
      }
      .section-title {
        font-size: 11px;
        font-weight: 600;
        color: #fff;
        letter-spacing: 0.01em;
      }
      .section-meta {
        font-size: 10px;
        color: #444;
        margin-left: auto;
      }
      .section-body {
        padding: 6px 16px 16px;
      }

      /* ── Option cards ── */
      .opt {
        border: 1px solid #1e1e1e;
        border-radius: 10px;
        margin-bottom: 6px;
        cursor: pointer;
        transition: border-color 0.12s;
        overflow: hidden;
        background: #141414;
        position: relative;
      }
      .opt:hover {
        border-color: #333;
      }
      .opt.selected {
        border-color: #fff;
      }
      .opt-inner {
        padding: 12px 14px;
      }
      .opt-name {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 2px;
      }
      .opt-desc {
        font-size: 10px;
        color: #666;
        line-height: 1.4;
      }
      .opt-tag {
        font-size: 9px;
        color: #444;
        margin-top: 4px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .opt-rec {
        position: absolute;
        top: 8px;
        right: 10px;
        font-size: 8px;
        font-weight: 700;
        color: #4ade80;
        background: rgba(74, 222, 128, 0.08);
        padding: 2px 6px;
        border-radius: 3px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      /* ── Palette option ── */
      .pal-strip {
        display: flex;
        height: 28px;
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 8px;
      }
      .pal-strip > div {
        flex: 1;
      }
      .pal-ramp {
        display: flex;
        gap: 2px;
        margin-top: 4px;
      }
      .pal-ramp-swatch {
        width: 100%;
        height: 6px;
        border-radius: 2px;
      }

      /* ── Type option (specimen) ── */
      .type-specimen {
        padding: 14px;
        border-bottom: 1px solid #1a1a1a;
      }
      .type-headline {
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin-bottom: 6px;
      }
      .type-body {
        line-height: 1.5;
        color: #666;
        font-size: 11px;
      }
      .type-meta {
        padding: 10px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .type-families {
        font-size: 9px;
        color: #444;
        letter-spacing: 0.02em;
      }
      .type-letters {
        font-size: 9px;
        color: #333;
        letter-spacing: 0.08em;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        max-width: 200px;
      }

      /* ── Chip options ── */
      .chips {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .chip {
        border: 1px solid #1e1e1e;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        transition: border-color 0.12s;
        display: flex;
        align-items: center;
        gap: 8px;
        background: #141414;
      }
      .chip:hover {
        border-color: #333;
      }
      .chip.selected {
        border-color: #fff;
      }
      .chip-label {
        font-size: 11px;
        font-weight: 500;
      }
      .chip-sub {
        font-size: 9px;
        color: #555;
      }
      .chip-preview {
        flex-shrink: 0;
      }

      .theme-chip {
        flex: 1;
        min-width: 90px;
        flex-direction: column;
        align-items: center;
        padding: 10px 12px;
        text-align: center;
      }
      .theme-swatch {
        width: 100%;
        height: 28px;
        border-radius: 4px;
        margin-bottom: 4px;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .corner-box {
        width: 22px;
        height: 22px;
        border: 2px solid #666;
      }
      .density-bars {
        display: flex;
        flex-direction: column;
        width: 24px;
      }
      .density-bar {
        background: #666;
        height: 3px;
        border-radius: 1px;
      }
      .depth-square {
        width: 22px;
        height: 22px;
        background: #2a2a2a;
        border-radius: 3px;
      }

      /* ── Easing option ── */
      .ease-opt {
        border: 1px solid #1e1e1e;
        border-radius: 10px;
        margin-bottom: 6px;
        cursor: pointer;
        transition: border-color 0.12s;
        overflow: hidden;
        background: #141414;
        padding: 10px 14px;
      }
      .ease-opt:hover {
        border-color: #333;
      }
      .ease-opt.selected {
        border-color: #fff;
      }
      .ease-track {
        position: relative;
        height: 8px;
        background: #1a1a1a;
        border-radius: 4px;
        margin-bottom: 8px;
        overflow: visible;
      }
      .ease-dot {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        left: 0;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #fff;
      }
      .ease-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .ease-name {
        font-size: 11px;
        font-weight: 600;
      }
      .ease-value {
        font-size: 9px;
        color: #444;
        font-family: "SF Mono", Consolas, monospace;
        letter-spacing: 0.02em;
      }

      .preview-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #2a2a2a;
        font-size: 13px;
      }

      /* ── FAB + Overlay ── */
      .fab {
        position: fixed;
        bottom: 20px;
        right: 32px;
        transform: translateY(60px);
        opacity: 0;
        background: #fff;
        color: #000;
        border: none;
        padding: 12px 24px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
        transition:
          transform 0.25s ease,
          opacity 0.25s ease;
        z-index: 100;
      }
      .fab.visible {
        transform: translateY(0);
        opacity: 1;
      }
      .fab:hover {
        background: #ddd;
      }

      .md-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(8px);
        z-index: 200;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .md-overlay.visible {
        display: flex;
      }
      .md-card {
        background: #161616;
        border: 1px solid #2a2a2a;
        border-radius: 14px;
        max-width: 600px;
        width: 90%;
        max-height: 80vh;
        display: flex;
        flex-direction: column;
      }
      .md-header {
        padding: 16px 20px;
        border-bottom: 1px solid #1e1e1e;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .md-title {
        font-size: 14px;
        font-weight: 600;
      }
      .md-actions {
        display: flex;
        gap: 6px;
      }
      .copy-btn {
        background: #fff;
        color: #000;
        border: none;
        padding: 7px 16px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .copy-btn:hover {
        background: #ddd;
      }
      .close-btn {
        background: transparent;
        color: #666;
        border: 1px solid #2a2a2a;
        padding: 7px 14px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
      }
      .close-btn:hover {
        color: #fff;
        border-color: #444;
      }
      .md-body {
        padding: 20px;
        overflow-y: auto;
        flex: 1;
      }
      .md-editor {
        font-family: "SF Mono", Consolas, monospace;
        font-size: 12px;
        line-height: 1.6;
        color: #aaa;
        background: transparent;
        border: none;
        width: 100%;
        min-height: 360px;
        resize: vertical;
        outline: none;
        white-space: pre-wrap;
      }

      /* ── Phase 1 palette bar ── */
      .pal-bar {
        display: flex;
        gap: 8px;
        padding: 12px 20px 0;
        flex-shrink: 0;
        flex-wrap: wrap;
        align-items: center;
      }
      .pal-bar-label {
        font-size: 10px;
        color: #444;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        margin-right: 4px;
      }
      .pal-bar-chip {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border: 1px solid #1e1e1e;
        border-radius: 6px;
        cursor: pointer;
        transition: border-color 0.12s;
        background: #141414;
      }
      .pal-bar-chip:hover {
        border-color: #333;
      }
      .pal-bar-chip.active {
        border-color: #fff;
      }
      .pal-bar-chip-swatches {
        display: flex;
        gap: 2px;
      }
      .pal-bar-chip-swatch {
        width: 14px;
        height: 14px;
        border-radius: 3px;
      }
      .pal-bar-chip-name {
        font-size: 10px;
        font-weight: 500;
        color: #888;
      }
    </style>
  </head>
  <body>
    <div class="phase-bar">
      <div class="phase-tab active" id="tab-mood" onclick="showPhase('mood')">1. Direction</div>
      <div class="phase-tab disabled" id="tab-tune" onclick="showPhase('tune')">2. Fine-tune</div>
    </div>

    <!-- Phase 1: Mood boards -->
    <div class="phase active" id="phase-mood" style="flex-direction: column">
      <div class="mood-header">
        <h2 id="mood-title">Pick a direction</h2>
        <p id="mood-subtitle">
          Each option is a complete visual identity. Pick one, then fine-tune.
        </p>
      </div>
      <div class="pal-bar" id="pal-bar"><span class="pal-bar-label">Palette</span></div>
      <div class="mood-grid" id="mood-grid"></div>
      <div class="mood-next">
        <button class="mood-next-btn" id="mood-next-btn" onclick="goToTune()">
          Customize this direction →
        </button>
      </div>
    </div>

    <!-- Phase 2: Fine-tune -->
    <div class="phase" id="phase-tune" style="flex-direction: row">
      <div class="panel-left">
        <!-- Theme -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-icon">◐</div>
            <div class="section-title">Theme</div>
          </div>
          <div class="section-body"><div class="chips" id="theme-options"></div></div>
        </div>
        <!-- Structure -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-icon">▦</div>
            <div class="section-title">Structure</div>
            <div class="section-meta" id="arch-meta"></div>
          </div>
          <div class="section-body" id="arch-options"></div>
        </div>
        <!-- Palette -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-icon">◉</div>
            <div class="section-title">Color</div>
          </div>
          <div class="section-body" id="pal-options"></div>
        </div>
        <!-- Typography -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-icon">Aa</div>
            <div class="section-title">Typography</div>
          </div>
          <div class="section-body" id="type-options"></div>
        </div>
        <!-- Corners -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-icon">⬔</div>
            <div class="section-title">Corners</div>
          </div>
          <div class="section-body"><div class="chips" id="corner-options"></div></div>
        </div>
        <!-- Density -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-icon">≡</div>
            <div class="section-title">Density</div>
          </div>
          <div class="section-body"><div class="chips" id="density-options"></div></div>
        </div>
        <!-- Depth -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-icon">◧</div>
            <div class="section-title">Depth</div>
          </div>
          <div class="section-body"><div class="chips" id="depth-options"></div></div>
        </div>
        <!-- Background -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-icon">◉</div>
            <div class="section-title">Background</div>
          </div>
          <div class="section-body"><div class="chips" id="bg-options"></div></div>
        </div>
        <!-- Motion / Easing -->
        <div class="section-card">
          <div class="section-header">
            <div class="section-icon">⟿</div>
            <div class="section-title">Motion</div>
            <div class="section-meta">entry easing</div>
          </div>
          <div class="section-body" id="ease-options"></div>
        </div>
      </div>
      <div class="panel-right" id="preview">
        <div class="preview-empty">Pick a structure to preview</div>
      </div>
    </div>

    <button class="fab" id="fab" onclick="showOutput()">Create design.md</button>

    <div class="md-overlay" id="md-overlay">
      <div class="md-card">
        <div class="md-header">
          <div class="md-title">
            design.md
            <span style="font-size: 11px; font-weight: 400; color: #555">— edit, then copy</span>
          </div>
          <div class="md-actions">
            <button class="copy-btn" id="copy-btn">Copy</button>
            <button
              class="close-btn"
              onclick="document.getElementById('md-overlay').classList.remove('visible')"
            >
              Close
            </button>
          </div>
        </div>
        <div class="md-body">
          <textarea class="md-editor" id="md-output" spellcheck="false"></textarea>
        </div>
      </div>
    </div>

    <script>
      var ARCHITECTURES = __ARCHITECTURES_JSON__;
      var PALETTES = __PALETTES_JSON__;
      var TYPEPAIRS = __TYPEPAIRS_JSON__;
      var MOODBOARDS = __MOODBOARDS_JSON__;
      var PROMPT = __PROMPT_JSON__;
      var picks = {
        theme: null,
        arch: null,
        palette: null,
        type: null,
        corners: null,
        density: null,
        depth: null,
        easing: null,
        bgEffect: null,
      };

      var EASINGS = [
        { name: "Confident", value: "power3.out", desc: "Fast start, smooth deceleration" },
        { name: "Snappy", value: "expo.out", desc: "Very fast start, crisp stop" },
        { name: "Gentle", value: "sine.inOut", desc: "Soft acceleration and deceleration" },
        { name: "Bouncy", value: "back.out(1.4)", desc: "Overshoots then settles" },
        { name: "Elastic", value: "elastic.out(1, 0.5)", desc: "Springs past target and wobbles" },
        { name: "Sharp", value: "power4.out", desc: "Aggressive start, hard stop" },
      ];

      var THEMES = [
        { name: "Dark", id: "dark", bg: "#0e0e0e", fg: "#eee", desc: "Light on dark" },
        { name: "Light", id: "light", bg: "#f5f3ef", fg: "#1a1a1a", desc: "Dark on light" },
        { name: "Palette", id: "palette", bg: null, fg: null, desc: "Use palette colors" },
      ];
      var CORNERS = [
        { name: "Sharp", value: "0px" },
        { name: "Slight", value: "4px" },

      renderMoodBoards();

      function scaleMoodPreviews() {

      // ── Procedural canvas backgrounds ──
      var _canvasRunners = [], _canvasRafRunning = false;
      function _startCanvasLoop() {
        if (_canvasRafRunning) return;
        _canvasRafRunning = true;
        function loop(t) {
          _canvasRunners.forEach(function(r) { if (r.cvs.offsetParent !== null) r.render(t); });
          if (_canvasRunners.length) requestAnimationFrame(loop); else _canvasRafRunning = false;
        }
        requestAnimationFrame(loop);
      }
      function initCanvases() {
        _canvasRunners = [];
        requestAnimationFrame(function() { requestAnimationFrame(function() { _initCanvasesInner(); }); });
      }
      function _initCanvasesInner() {
      (function() {
        function hexToRgb(h) {
          h = h.replace('#','');
          if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
          return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
        }
        function mulberry32(a) {
          return function() { a |= 0; a = a + 0x6D2B79F5 | 0;
            var t = Math.imul(a ^ a >>> 15, 1 | a); t ^= t + Math.imul(t ^ t >>> 7, 61 | t);
            return ((t ^ t >>> 14) >>> 0) / 4294967296; };
        }
        function makeNoise(seed) {
          var rng = mulberry32(seed);
          var SIZE = 64, grid = [];
          for (var i = 0; i < SIZE * SIZE; i++) grid[i] = rng();
          return function(x, y, oct) {
            function sm(x,y) {
              var ix=((x|0)%SIZE+SIZE)%SIZE,iy=((y|0)%SIZE+SIZE)%SIZE;
              var fx=x-Math.floor(x),fy=y-Math.floor(y);
              fx=fx*fx*(3-2*fx);fy=fy*fy*(3-2*fy);
              var nx=(ix+1)%SIZE,ny=(iy+1)%SIZE;
              return grid[iy*SIZE+ix]*(1-fx)*(1-fy)+grid[iy*SIZE+nx]*fx*(1-fy)+grid[ny*SIZE+ix]*(1-fx)*fy+grid[ny*SIZE+nx]*fx*fy;
            }
            var v=0,amp=1,freq=1,max=0;
            for(var o=0;o<(oct||3);o++){v+=sm(x*freq,y*freq)*amp;max+=amp;amp*=0.5;freq*=2;}
            return v/max;
          };
        }
        function drawStar(ctx,cx,cy,r,col) {
          ctx.beginPath();
          for(var i=0;i<5;i++){
            var a=Math.PI*2*i/5-Math.PI/2;
            ctx[i===0?'moveTo':'lineTo'](cx+Math.cos(a)*r,cy+Math.sin(a)*r);
            var b=a+Math.PI/5;
            ctx.lineTo(cx+Math.cos(b)*r*0.4,cy+Math.sin(b)*r*0.4);
          }
          ctx.closePath();ctx.fillStyle=col;ctx.fill();
        }

        var canvases = document.querySelectorAll('.mood-canvas');
        var runners = _canvasRunners;

        canvases.forEach(function(cvs) {
          var rawConf = cvs.dataset.config || "";
          var conf;
          try { conf = JSON.parse(decodeURIComponent(rawConf)); } catch(e) {
            // Legacy string format — shouldn't happen but fallback
            conf = { type: rawConf };
          }
          if (!conf || !conf.type) return;

          var ac = hexToRgb(cvs.dataset.ac);
          var bgc = hexToRgb(cvs.dataset.bgColor || '#000000');
          var fg = hexToRgb(cvs.dataset.fg || '#ffffff');
          var mt = hexToRgb(cvs.dataset.mt || '#666666');
          var ctx = cvs.getContext('2d');
          var w, h, dpr;
          var c = conf.config || {};
          var col = c.color === 'fg' ? fg : c.color === 'muted' ? mt : ac;

          function resize() {
            dpr = Math.min(window.devicePixelRatio || 1, 2);
            var rect = cvs.parentElement.getBoundingClientRect();
            w = rect.width; h = rect.height;
            cvs.width = w * dpr; cvs.height = h * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          }
          resize();

          var render;
          var seed = (conf.type + JSON.stringify(c)).length * 7 + ac[0];
          var rng = mulberry32(seed);

          if (conf.type === 'dots') {
            // Configurable dot/shape particles
            var count = c.count || 40;
            var shape = c.shape || 'circle';
            var drift = c.drift || 'up';
            var sMin = (c.sizeRange || [1,3])[0], sMax = (c.sizeRange || [1,3])[1];
            var oMin = (c.opacity || [0.05,0.3])[0], oMax = (c.opacity || [0.05,0.3])[1];
            var spd = c.speed || 0.3;
            var pts = [];
            for (var i = 0; i < count; i++) pts.push({
              x: rng(), y: rng(),
              s: rng()*(sMax-sMin)+sMin,
              v: rng()*spd+spd*0.3,
              a: rng()*(oMax-oMin)+oMin,
              phase: rng()*Math.PI*2
            });
            render = function(t) {
              ctx.clearRect(0,0,w,h);
              pts.forEach(function(p) {
                var px = p.x * w, py;
                if (drift === 'up') { py = ((p.y - t*p.v*0.0001) % 1); if(py<0)py+=1; py*=h; }
                else if (drift === 'down' || drift === 'fall') { py = ((p.y + t*p.v*0.0001) % 1); py*=h; }
                else if (drift === 'twinkle') { py = p.y*h; }
                else { py = p.y*h + Math.sin(t*0.001+p.phase)*10; px += Math.sin(t*0.0008+p.phase*1.3)*8; }
                var alpha = p.a;
                if (drift === 'twinkle') alpha *= (0.5 + 0.5*Math.sin(t*0.003+p.phase));
                var rgba = 'rgba('+col[0]+','+col[1]+','+col[2]+','+alpha+')';
                if (shape === 'star') { drawStar(ctx, px, py, p.s, rgba); }
                else { ctx.beginPath(); ctx.arc(px, py, p.s, 0, Math.PI*2); ctx.fillStyle = rgba; ctx.fill(); }
              });
            };
          } else if (conf.type === 'noise') {
            var noise = makeNoise(c.seed || 42);
            var scale = c.scale || 0.04;
            var maxAlpha = c.maxAlpha || 80;
            var tmpCvs = document.createElement('canvas');
            var tmpCtx = tmpCvs.getContext('2d');
            render = function(t) {
              var sw=Math.ceil(w/4),sh=Math.ceil(h/4);
              tmpCvs.width=sw;tmpCvs.height=sh;
              var img=tmpCtx.createImageData(sw,sh);
              var off=t*0.0003;
              for(var y=0;y<sh;y++)for(var x=0;x<sw;x++){
                var v=noise(x*scale+off,y*scale+off*0.7,4);
                var idx=(y*sw+x)*4;
                img.data[idx]=Math.floor(col[0]*v*0.5);
                img.data[idx+1]=Math.floor(col[1]*v*0.3);
                img.data[idx+2]=Math.floor(col[2]*v*0.2);
                img.data[idx+3]=Math.floor(v*maxAlpha);
              }
              tmpCtx.putImageData(img,0,0);
              ctx.clearRect(0,0,w,h);ctx.imageSmoothingEnabled=true;
              ctx.drawImage(tmpCvs,0,0,w,h);
            };
          } else if (conf.type === 'rings') {
            var rCount = c.count || 3;
            var rSpeed = c.speed || 0.0005;
            var rMax = c.maxRadius || 0.6;
            render = function(t) {
              ctx.clearRect(0,0,w,h);
              var cx=(c.cx||0.5)*w, cy=(c.cy||0.5)*h;
              for(var i=0;i<rCount;i++){
                var phase=((t*rSpeed+i/rCount)%1);
                var r=phase*Math.max(w,h)*rMax;
                var alpha=(1-phase)*(c.maxAlpha||0.15);
                ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
                ctx.strokeStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+alpha+')';
                ctx.lineWidth=c.lineWidth||1.5;ctx.stroke();
              }
            };
          } else if (conf.type === 'sweep') {
            var dir = c.direction || 'down';
            var band = c.bandWidth || 40;
            var sweepSpd = c.speed || 0.02;
            render = function(t) {
              ctx.clearRect(0,0,w,h);
              var pos = ((t*sweepSpd) % (dir==='down'||dir==='up'?h:w));
              var g;
              if (dir==='down'||dir==='up') {
                if(dir==='up') pos=h-pos;
                g=ctx.createLinearGradient(0,pos-band,0,pos+band);
              } else {
                if(dir==='left') pos=w-pos;
                g=ctx.createLinearGradient(pos-band,0,pos+band,0);
              }
              g.addColorStop(0,'rgba('+col[0]+','+col[1]+','+col[2]+',0)');
              g.addColorStop(0.5,'rgba('+col[0]+','+col[1]+','+col[2]+','+(c.peakAlpha||0.08)+')');
              g.addColorStop(1,'rgba('+col[0]+','+col[1]+','+col[2]+',0)');
              ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
            };
          } else if (conf.type === 'glow') {
            var blobs = [];
            var bCount = c.count || 3;
            for(var i=0;i<bCount;i++) blobs.push({x:rng(),y:rng(),r:rng()*(c.maxSize||0.15)+0.08});
            render = function(t) {
              ctx.clearRect(0,0,w,h);
              blobs.forEach(function(b,bi){
                var bx=(b.x+Math.sin(t*0.0004+bi*2)*0.1)*w;
                var by=(b.y+Math.cos(t*0.0005+bi*3)*0.08)*h;
                var br=b.r*Math.min(w,h);
                var g=ctx.createRadialGradient(bx,by,0,bx,by,br);
                g.addColorStop(0,'rgba('+col[0]+','+col[1]+','+col[2]+','+(c.peakAlpha||0.12)+')');
                g.addColorStop(1,'rgba('+col[0]+','+col[1]+','+col[2]+',0)');
                ctx.fillStyle=g;ctx.fillRect(bx-br,by-br,br*2,br*2);

            };
          } else if (conf.type === 'mesh') {
            var mRows = c.rows || 12, mCols = c.cols || 16;
            var mAmp = c.amplitude || 8;
            render = function(t) {
              ctx.clearRect(0,0,w,h);
              ctx.strokeStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(c.opacity||0.08)+')';
              ctx.lineWidth=0.5;
              for(var r=0;r<mRows;r++){ctx.beginPath();for(var cc=0;cc<=mCols;cc++){var x=(cc/mCols)*w;var y=(r/mRows)*h+Math.sin(cc*0.5+t*0.001+r)*mAmp;if(cc===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.stroke();}
              for(var cc=0;cc<mCols;cc++){ctx.beginPath();for(var r=0;r<=mRows;r++){var x=(cc/mCols)*w+Math.sin(r*0.5+t*0.0012+cc)*mAmp*0.75;var y=(r/mRows)*h;if(r===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.stroke();}
            };
          } else if (conf.type === 'text') {
            // Falling/floating text characters
            var chars = c.chars || '0123456789';
            var tCols = [];
            var tCount = c.count || 25;
            for(var i=0;i<tCount;i++) {
              var cc=[];for(var j=0;j<(c.depth||6);j++) cc.push(chars[Math.floor(rng()*chars.length)]);
              tCols.push({x:rng(),y:rng(),speed:rng()*(c.speed||0.01)+0.003,chars:cc});
            }
            render = function(t) {
              ctx.clearRect(0,0,w,h);
              ctx.font=(c.fontSize||10)+'px monospace';
              tCols.forEach(function(tc){
                var px=tc.x*w;

                  ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+a+')';
                  ctx.fillText(ch,px,py);
                });
              });
            };
          } else {
            render = null;
          }

          if (render) runners.push({ cvs: cvs, render: render, resize: resize });
        });

        if (runners.length > 0) {
          _startCanvasLoop();
          window.addEventListener('resize', function() { runners.forEach(function(r) { r.resize(); }); });
        }
      })();
      } // end _initCanvasesInner

      var currentPhase = "mood";

          ';"></div><div style="background:' +
          p.foreground +
          ';"></div></div><div class="opt-name">' +
          p.name +
          '</div><div class="opt-desc">' +
          p.description +
          "</div></div>";
        el.onclick = function () {
          sel("palette", i, palOpts);
        };
        palOpts.appendChild(el);
      });

      // Typography cards with specimen
      var typeOpts = document.getElementById("type-options");
      TYPEPAIRS.forEach(function (tp, i) {
        var letters = "AaBbCcDdEeFfGgHh";
        var el = document.createElement("div");
        el.className = "opt";
        el.innerHTML =
          '<div class="type-specimen"><div class="type-headline" style="font-family:\'' +
          tp.headline.family +
          "',sans-serif;font-weight:" +
          tp.headline.weight +
          ';font-size:24px;">' +
          tp.preview +
          '</div><div class="type-body" style="font-family:\'' +
          tp.body.family +
          "',monospace;font-weight:" +
          tp.body.weight +
          ';">' +
          tp.body_preview +
          '</div></div><div class="type-meta"><div class="type-families">' +
          tp.headline.family +
          " " +
          tp.headline.weight +
          " · " +
          tp.body.family +
          " " +
          tp.body.weight +
          '</div><div class="type-letters" style="font-family:\'' +
          tp.headline.family +
          "',sans-serif;font-weight:" +
          tp.headline.weight +
          ';">' +
          letters +
          "</div></div>";
        el.onclick = function () {
          sel("type", i, typeOpts);
        };
        typeOpts.appendChild(el);
      });

      // Theme chips
      var themeOpts = document.getElementById("theme-options");
      THEMES.forEach(function (th, i) {
        var el = document.createElement("div");
        el.className = "chip theme-chip";
        el.innerHTML =
          '<div class="theme-swatch" style="background:' +
          th.bg +
          ';"></div><div class="chip-label">' +
          th.name +
          '</div><div class="chip-sub">' +
          th.desc +
          "</div>";
        el.onclick = function () {
          chipSel("theme", i, themeOpts);
        };
        themeOpts.appendChild(el);
      });

      // Corner chips
      var cornerOpts = document.getElementById("corner-options");
      CORNERS.forEach(function (c, i) {
        var el = document.createElement("div");
        el.className = "chip";
        el.innerHTML =
          '<div class="chip-preview"><div class="corner-box" style="border-radius:' +
          c.value +
          ';"></div></div><div><div class="chip-label">' +
          c.name +
          '</div><div class="chip-sub">' +
          c.value +
          "</div></div>";
        el.onclick = function () {
          chipSel("corners", i, cornerOpts);
        };
        cornerOpts.appendChild(el);
      });

      // Density chips
      var densityOpts = document.getElementById("density-options");
      DENSITIES.forEach(function (d, i) {
        var gaps = [2, 4, 7][i];
        var el = document.createElement("div");
        el.className = "chip";
        el.innerHTML =
          '<div class="chip-preview"><div class="density-bars" style="gap:' +
          gaps +
          'px;"><div class="density-bar"></div><div class="density-bar"></div><div class="density-bar"></div></div></div><div><div class="chip-label">' +
          d.name +
          '</div><div class="chip-sub">' +
          d.desc +
          "</div></div>";
        el.onclick = function () {
          chipSel("density", i, densityOpts);
        };
        densityOpts.appendChild(el);
      });

      // Depth chips
      var depthOpts = document.getElementById("depth-options");
      DEPTHS.forEach(function (d, i) {
        var shadow = [
          "none",
          "0 2px 8px rgba(255,255,255,0.04)",
          "0 0 16px rgba(255,255,255,0.06)",
        ][i];
        var el = document.createElement("div");
        el.className = "chip";
        el.innerHTML =
          '<div class="chip-preview"><div class="depth-square" style="box-shadow:' +
          shadow +
          ';"></div></div><div><div class="chip-label">' +
          d.name +
          '</div><div class="chip-sub">' +
          d.desc +
          "</div></div>";
        el.onclick = function () {
          chipSel("depth", i, depthOpts);
        };
        depthOpts.appendChild(el);
      });

      // Background effect chips — generic primitives, context comes from architecture bg_canvas
      var BG_EFFECTS = [
        { name: "None", desc: "Solid color only", canvasConf: null },
        { name: "Dots", desc: "Floating particles", canvasConf: {type:"dots",config:{count:40,shape:"circle",drift:"float",sizeRange:[1,3],opacity:[0.05,0.25],speed:0.3}} },
        { name: "Stars", desc: "Twinkling points", canvasConf: {type:"dots",config:{count:50,shape:"star",drift:"twinkle",sizeRange:[2,5],opacity:[0.1,0.4],speed:0.2}} },
        { name: "Noise Field", desc: "Shifting color fog", canvasConf: {type:"noise",config:{scale:0.04,maxAlpha:60}} },
        { name: "Rings", desc: "Expanding circles", canvasConf: {type:"rings",config:{count:3,speed:0.0005,maxRadius:0.6,maxAlpha:0.12}} },
        { name: "Sweep", desc: "Moving light band", canvasConf: {type:"sweep",config:{direction:"down",bandWidth:40,speed:0.02,peakAlpha:0.06}} },
        { name: "Glow", desc: "Drifting color blobs", canvasConf: {type:"glow",config:{count:3,maxSize:0.18,peakAlpha:0.1}} },
        { name: "Mesh", desc: "Deforming grid", canvasConf: {type:"mesh",config:{rows:12,cols:16,amplitude:8,opacity:0.06,color:"muted"}} },
      ];
      var bgOpts = document.getElementById("bg-options");
      BG_EFFECTS.forEach(function (b, i) {
        var el = document.createElement("div");
        el.className = "chip";
        el.innerHTML =
          '<div class="chip-preview" style="background:#111;width:48px;height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#666;">' +
          (b.value ? '◉' : '—') +
          '</div><div><div class="chip-label">' +
          b.name +
          '</div><div class="chip-sub">' +
          b.desc +
          "</div></div>";
        el.onclick = function () {
          chipSel("bgEffect", i, bgOpts);
        };
        bgOpts.appendChild(el);
      });

      // Easing options with GSAP animation
      var easeOpts = document.getElementById("ease-options");
      EASINGS.forEach(function (e, i) {
        var el = document.createElement("div");
        el.className = "ease-opt";
        var dotId = "ease-dot-" + i;
        el.innerHTML =
          '<div class="ease-track"><div class="ease-dot" id="' +
          dotId +
          '"></div></div>' +
          '<div class="ease-label"><div class="ease-name">' +
          e.name +
          '</div><div class="ease-value">' +
          e.value +
          "</div></div>";
        el.onclick = function () {
          easeOpts.querySelectorAll(".ease-opt").forEach(function (c) {
            c.classList.remove("selected");
          });
          el.classList.add("selected");
          picks.easing = i;
          checkReady();
        };
        easeOpts.appendChild(el);
        // Animate the dot with GSAP
        gsap.to("#" + dotId, {
          left: "calc(100% - 12px)",
          duration: 1.2,
          ease: e.value,
          repeat: -1,
          repeatDelay: 0.8,
          yoyo: true,
        });
      });

      function chipSel(key, idx, container) {
        container.querySelectorAll(".chip").forEach(function (c) {
          c.classList.remove("selected");
        });
        container.children[idx].classList.add("selected");
        picks[key] = idx;
        checkReady();
        renderPreview();
      }
      function sel(key, idx, container) {
        container.querySelectorAll(".opt").forEach(function (c) {
          c.classList.remove("selected");
        });
        container.children[idx].classList.add("selected");
        picks[key] = idx;
        checkReady();
        renderPreview();
      }

      function checkReady() {
        var ready =
          picks.theme !== null &&
          picks.arch !== null &&
          picks.palette !== null &&
          picks.type !== null &&
          picks.corners !== null &&
          picks.density !== null &&
          picks.depth !== null &&
          picks.easing !== null &&
          picks.bgEffect !== null;
        document
          .getElementById("fab")
          .classList.toggle("visible", ready && currentPhase === "tune");
        document.getElementById("md-overlay").classList.remove("visible");
      }

      function renderPreview() {
        var pv = document.getElementById("preview");
        if (picks.arch === null) {
          pv.innerHTML = '<div class="preview-empty">Pick a structure to preview</div>';
          return;
        }
        var a = ARCHITECTURES[picks.arch];
        var th = picks.theme !== null ? THEMES[picks.theme] : THEMES[0];
        var p =
          picks.palette !== null ? PALETTES[picks.palette] : { accent: "#888", muted: "#555" };
        var t =
          picks.type !== null
            ? TYPEPAIRS[picks.type]
            : {
                headline: { family: "system-ui", weight: 600 },
                body: { family: "system-ui", weight: 400 },
              };
        var cr = picks.corners !== null ? CORNERS[picks.corners].value : "0px";
        var dn = picks.density !== null ? picks.density : 1;
        var dp = picks.depth !== null ? picks.depth : 0;
        var bg, fg;
        if (th.id === "palette" && p.background) {
          bg = p.background;
          fg = p.foreground;
        } else {
          bg = th.bg;
          fg = th.fg;
        }
        var ac = p.accent,
          mt = p.muted || al(fg, 0.4);
        var pad = [12, 20, 36][dn] + "px",
          gap = [8, 16, 28][dn] + "px";
        var isDark = bg && bg[0] === "#" ? parseInt(bg.slice(1, 3), 16) < 80 : true;
        var shCol = isDark ? ac : fg;
        var shadow = [
          "none",
          "0 2px 16px " + al(shCol, isDark ? 0.15 : 0.1),
          "0 4px 32px " + al(shCol, isDark ? 0.3 : 0.18),
        ][dp];
        var tokens = {
          "{{bg}}": bg,
          "{{fg}}": fg,
          "{{ac}}": ac,
          "{{mt}}": mt,
          "{{sf}}": al(fg, 0.06),
          "{{hf}}": t.headline.family,
          "{{hw}}": t.headline.weight,
          "{{bf}}": t.body.family,
          "{{bw}}": t.body.weight,
          "{{cr}}": cr,
          "{{pad}}": pad,
          "{{gap}}": gap,
          "{{shadow}}": shadow,
          "{{g}}": al(fg, 0.06),
          "{{fg3}}": al(fg, 0.03),
          "{{fg6}}": al(fg, 0.06),
          "{{fg8}}": al(fg, 0.08),
          "{{fg15}}": al(fg, 0.15),
          "{{ac3}}": al(ac, 0.03),
          "{{ac5}}": al(ac, 0.05),
          "{{ac25}}": al(ac, 0.25),
          "{{prompt_headline}}": (PROMPT && PROMPT.headline) || "Your Headline",
          "{{prompt_sub}}": (PROMPT && PROMPT.subline) || "Subline.",
        };
        var frames = a.preview_frames || [a.preview_html || ""];
        var combined = frames.map(function(f) {
          var resolved = f || "";
          Object.keys(tokens).forEach(function (k) {
            resolved = resolved.split(k).join(tokens[k]);
          });
          return resolved;
        }).join("");

        var bgFxObj = picks.bgEffect !== null ? BG_EFFECTS[picks.bgEffect].canvasConf : (a.bg_canvas || null);
        var canvasTag = bgFxObj ? '<canvas class="mood-canvas preview-bg-canvas" data-config="' + encodeURIComponent(JSON.stringify(bgFxObj)).replace(/"/g, '&quot;') + '" data-ac="' + ac + '" data-bg-color="' + bg + '" data-fg="' + fg + '" data-mt="' + mt + '" style="position:sticky;top:0;width:100%;height:100vh;z-index:0;margin-bottom:-100vh;pointer-events:none;"></canvas>' : '';
        pv.style.background = bg;
        pv.innerHTML = canvasTag + '<div style="position:relative;z-index:1;display:flex;flex-direction:column;gap:2px;">' + combined + '</div>';
        if (bgFxVal) {
          requestAnimationFrame(function() { requestAnimationFrame(function() { _initCanvasesInner(); }); });
        }
      }

      // ── Output ──
      function showOutput() {
        if (
          picks.theme === null ||
          picks.arch === null ||
          picks.palette === null ||
          picks.type === null ||
          picks.corners === null ||
          picks.density === null ||
          picks.depth === null ||
          picks.bgEffect === null
        )
          return;
        var a = ARCHITECTURES[picks.arch],
          p = PALETTES[picks.palette],
          t = TYPEPAIRS[picks.type];
        var th = THEMES[picks.theme],
          cr = CORNERS[picks.corners],
          dn = DENSITIES[picks.density],
          dp = DEPTHS[picks.depth],
          bgFx = BG_EFFECTS[picks.bgEffect];
        var bg = th.id === "palette" && p.background ? p.background : th.bg;
        var fg = th.id === "palette" && p.foreground ? p.foreground : th.fg;
        var ac = p.accent,
          mt = p.muted || p.mid || "#888";
        var padVal = { Tight: "8px", Normal: "16px", Generous: "32px" }[dn.name] || "16px";
        var gapVal = { Tight: "8px", Normal: "16px", Generous: "28px" }[dn.name] || "16px";

        var md = "---\n";
        md += "name: " + ((PROMPT && PROMPT.title) || "Untitled") + "\n";
        md +=
          'colors:\n  primary: "' +
          bg +
          '"\n  on-primary: "' +
          fg +
          '"\n  accent: "' +
          ac +
          '"\n  muted: "' +
          mt +
          '"\n';
        md +=
          "typography:\n  headline:\n    fontFamily: " +
          t.headline.family +
          "\n    fontSize: 3.5rem\n    fontWeight: " +
          t.headline.weight +
          "\n    letterSpacing: -0.03em\n";
        md +=
          "  body:\n    fontFamily: " +
          t.body.family +
          "\n    fontSize: 1rem\n    fontWeight: " +
          t.body.weight +
          "\n    lineHeight: 1.5\n";
        md += "rounded:\n  md: " + cr.value + "\n";
        md += "spacing:\n  md: " + padVal + "\n  lg: " + gapVal + "\n";
        md += "---\n\n";
        md += "## Overview\n\n" + a.mood + ". " + a.description + ". " + p.description + ".\n\n";
        md +=
          "## Colors\n\n- **Primary** (`" +
          bg +
          "`) — Canvas background\n- **On-Primary** (`" +
          fg +
          "`) — Text and content\n- **Accent** (`" +
          ac +
          "`) — CTAs, highlights\n- **Muted** (`" +
          mt +
          "`) — Secondary text\n\n";
        md +=
          "## Typography\n\n- **Headline** — " +
          t.headline.family +
          " at weight " +
          t.headline.weight +
          "\n- **Body** — " +
          t.body.family +
          " at weight " +
          t.body.weight +
          "\n\n";
        md +=
          "## Layout\n\n- Structure: " +
          a.name +
          " — " +
          a.tag +
          "\n- Density: " +
          dn.name +
          " (" +
          dn.desc +
          ")\n- Corners: " +
          cr.name +
          " (" +
          cr.value +
          ")\n\n";
        md += "## Elevation\n\n" + dp.name + " — " + dp.desc + ".\n\n";
        var easeObj = picks.easing !== null ? EASINGS[picks.easing] : null;
        if (easeObj) {
          md +=
            "## Motion\n\n- **Entry easing:** `" +
            easeObj.value +
            "` — " +
            easeObj.desc +
            "\n- **Energy:** " +
            easeObj.name +
            "\n\n";
        }
        if (bgFx && bgFx.value) {
          var bgDescs = {
            "particles": "Animated particle field drifting slowly upward across the frame. 40-60 small circles (1-3px radius) in the accent color at 5-25% opacity. Each particle drifts upward at a different speed (0.1-0.4 units/sec). Use a seeded PRNG for deterministic positions. Particles wrap from bottom when they exit the top. Implement with GSAP: create absolutely-positioned divs, animate y with stagger and repeat.",
            "voronoi": "Subtle Voronoi cell edge pattern. 15-20 seed points distributed across the frame, slowly drifting (sine/cosine oscillation). Only render the cell EDGES as thin lines (1-2px) in the accent color at 10-15% opacity — do not fill cells. The effect should look like crystalline grain structure. Implement with SVG or Canvas 2D behind the scene content.",
            "perlin": "Animated false-color noise heatmap covering the full frame. Use 2D value noise (4 octaves) that shifts slowly over time. Map noise values to the accent color at 0-30% opacity — brighter where noise is high, transparent where low. The effect should resemble thermal camera footage with soft color blobs. Render at 1/4 resolution and scale up with image smoothing for soft edges.",
            "ring-pulse": "Concentric rings expanding from center of frame and fading out. 3 rings active at any time, staggered by 0.33 phase. Each ring expands from 0 to 60% of frame size over ~2 seconds, opacity fading from 15% to 0% as it grows. Accent color, 1-2px stroke, no fill. Implement with GSAP-animated border-radius divs or Canvas 2D arc().",
            "scanline": "Single horizontal scan line sweeping downward through the frame in a continuous loop. The line is a soft gradient band (~40px tall) in the accent color at 5-8% peak opacity, transparent at edges. Completes one full sweep every ~5 seconds. Implement with a GSAP-animated absolutely-positioned div with a gradient background.",
            "digits": "Faint falling monospace digits (0-9) in 25-30 columns across the frame. Each column falls at a different speed. Characters are 10-12px in the accent color at 3-8% opacity, with leading characters brighter and trailing ones fading. Wrap from top when exiting bottom. Implement with Canvas 2D fillText or absolutely-positioned spans animated with GSAP.",
            "sine-mesh": "Gently deforming grid mesh covering the frame. 12 horizontal and 16 vertical lines at the muted color and 5-8% opacity, 0.5px stroke. Lines are straight but displaced by a slow sine wave (amplitude ~8px, shifting over time). The effect should look like fabric or paper texture. Implement with SVG path elements or Canvas 2D lineTo.",
            "ripple": "Concentric circles radiating from center with an interference pattern effect. Rings spaced ~20px apart, each oscillating in opacity (0-6%) driven by a sine function of distance + time offset. The result is a pulsing interference pattern where rings appear to breathe. Use foreground color. Implement with Canvas 2D arc() in a loop.",
            "blobs": "2-3 soft radial gradient blobs in the accent color at 8-12% opacity, slowly drifting around the frame on sine/cosine paths. Each blob is 15-25% of frame size. Blobs overlap and blend additively. The effect should resemble a lava lamp or ambient light. Implement with absolutely-positioned divs with radial-gradient backgrounds animated with GSAP."
          };
          var bgDesc = bgDescs[bgFx.value] || bgFx.desc;
          md += "## Background\n\n- **Effect:** " + bgFx.name + "\n- **Implementation:** " + bgDesc + "\n\n";
        }
        if (a.components) md += "## Components\n\n" + a.components + "\n\n";
        md += "## Do's and Don'ts\n\n";
        if (a.dos) {
          md += a.dos + "\n";
        } else {
          md +=
            "### Do's\n- Use accent color sparingly for maximum impact\n- Maintain consistent " +
            cr.name.toLowerCase() +
            " corners\n\n### Don'ts\n- Do not mix multiple accent colors\n- Do not use weights outside the headline/body pair\n";
        }

        document.getElementById("md-output").value = md;
        document.getElementById("md-overlay").classList.add("visible");
      }

      document.getElementById("copy-btn").addEventListener("click", function () {
        navigator.clipboard.writeText(document.getElementById("md-output").value).then(function () {
          document.getElementById("copy-btn").textContent = "Copied!";
          setTimeout(function () {
            document.getElementById("copy-btn").textContent = "Copy";
          }, 2000);
        });
      });
    </script>
  </body>
</html>
